name: SLIDESNET-44710 MAUI Mac Catalyst
run-name: SLIDESNET-44710 MAUI Mac Catalyst

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build-and-inspect:
    name: Aspose.Slides ${{ matrix.slides-version }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - slides-version: "24.7.0"
            native-library-required: false
          - slides-version: "26.6.0"
            native-library-required: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Show environment
        run: |
          sw_vers
          xcodebuild -version
          dotnet --info

      - name: Install MAUI workload
        run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

      - name: Restore
        shell: bash
        run: |
          set +e
          dotnet restore \
            MauiSlidesCrossPlatformCheck/MauiSlidesCrossPlatformCheck.csproj \
            -p:SlidesPackageVersion=${{ matrix.slides-version }} \
            -p:RuntimeIdentifier=maccatalyst-x64 \
            2>&1 | tee restore-${{ matrix.slides-version }}.log
          restore_exit=${PIPESTATUS[0]}
          echo "## dotnet restore log, Aspose.Slides ${{ matrix.slides-version }}" >> "${GITHUB_STEP_SUMMARY}"
          echo '```text' >> "${GITHUB_STEP_SUMMARY}"
          tail -n 80 restore-${{ matrix.slides-version }}.log >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
          exit "${restore_exit}"

      - name: Build Mac Catalyst app
        shell: bash
        run: |
          set +e
          dotnet publish \
            MauiSlidesCrossPlatformCheck/MauiSlidesCrossPlatformCheck.csproj \
            -f net8.0-maccatalyst \
            -c Release \
            -p:SlidesPackageVersion=${{ matrix.slides-version }} \
            -p:RuntimeIdentifier=maccatalyst-x64 \
            -p:CreatePackage=false \
            -p:EnableCodeSigning=false \
            --no-restore \
            2>&1 | tee publish-${{ matrix.slides-version }}.log
          publish_exit=${PIPESTATUS[0]}
          echo "publish_exit=${publish_exit}" >> "${GITHUB_ENV}"
          echo "## dotnet publish log, Aspose.Slides ${{ matrix.slides-version }}" >> "${GITHUB_STEP_SUMMARY}"
          echo '```text' >> "${GITHUB_STEP_SUMMARY}"
          tail -n 80 publish-${{ matrix.slides-version }}.log >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
          exit "${publish_exit}"

      - name: Inspect app bundle native libraries
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find MauiSlidesCrossPlatformCheck/bin/Release/net8.0-maccatalyst -name '*.app' -type d | head -n 1)"
          if [[ -z "${app_path}" ]]; then
            echo "No .app bundle was produced."
            find MauiSlidesCrossPlatformCheck/bin -maxdepth 6 -type d -print
            exit 1
          fi

          echo "App bundle: ${app_path}"
          echo "Aspose native libraries found in bundle:"
          find "${app_path}" -name '*aspose.slides.drawing.capi*' -print | sort | tee native-libs-${{ matrix.slides-version }}.txt

          if grep -q 'libaspose.slides.drawing.capi_appleclang' native-libs-${{ matrix.slides-version }}.txt; then
            echo "Aspose.Slides macOS native drawing library is present."
          elif [[ "${{ matrix.native-library-required }}" == "true" ]]; then
            echo "::error::Aspose.Slides macOS native drawing library is missing from the Mac Catalyst bundle."
            exit 1
          else
            echo "::warning::Aspose.Slides macOS native drawing library is missing from the Mac Catalyst bundle."
          fi

      - name: Upload bundle inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slidesnet-44710-${{ matrix.slides-version }}
          path: |
            restore-${{ matrix.slides-version }}.log
            native-libs-${{ matrix.slides-version }}.txt
            publish-${{ matrix.slides-version }}.log
            MauiSlidesCrossPlatformCheck/bin/Release/net8.0-maccatalyst/**/*.app
