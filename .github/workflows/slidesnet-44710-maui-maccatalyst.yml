name: SLIDESNET-44710 Aspose.Slides Mac Catalyst Packaging
run-name: SLIDESNET-44710 Aspose.Slides Mac Catalyst Packaging

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build-and-inspect:
    name: Aspose.Slides ${{ matrix.slides-version }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - slides-version: "24.7.0"
            native-library-required: false
          - slides-version: "26.6.0"
            native-library-required: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Show environment
        run: |
          sw_vers
          xcodebuild -version
          dotnet --info

      - name: Install MAUI workload
        run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

      - name: Restore
        shell: bash
        run: |
          set -euo pipefail
          dotnet restore \
            MauiSlidesCrossPlatformCheck/MauiSlidesCrossPlatformCheck.csproj \
            -p:SlidesPackageVersion=${{ matrix.slides-version }} \
            -p:RuntimeIdentifier=maccatalyst-x64 \
            2>&1 | tee restore-${{ matrix.slides-version }}.log
          echo "## dotnet restore log, Aspose.Slides ${{ matrix.slides-version }}" >> "${GITHUB_STEP_SUMMARY}"
          echo '```text' >> "${GITHUB_STEP_SUMMARY}"
          tail -n 80 restore-${{ matrix.slides-version }}.log >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"

      - name: Inspect Aspose.Slides package targets
        shell: bash
        run: |
          set -euo pipefail

          package_dir="${HOME}/.nuget/packages/aspose.slides.net6.crossplatform/${{ matrix.slides-version }}"
          targets_file="${package_dir}/buildTransitive/Aspose.Slides.NET6.CrossPlatform.targets"
          native_dir="${package_dir}/net6.0_native"

          if [[ ! -f "${targets_file}" ]]; then
            echo "::error::Package targets file was not restored: ${targets_file}"
            exit 1
          fi

          {
            echo "Package: ${package_dir}"
            echo
            echo "Targets file:"
            sed -n '1,220p' "${targets_file}"
            echo
            echo "Native files:"
            find "${native_dir}" -maxdepth 1 -type f -name '*aspose.slides.drawing.capi*' -print | sort
          } | tee package-inspection-${{ matrix.slides-version }}.txt

          if ! grep -q 'libaspose.slides.drawing.capi_appleclang' package-inspection-${{ matrix.slides-version }}.txt; then
            echo "::error::Aspose.Slides package does not contain macOS native drawing libraries."
            exit 1
          fi

          if grep -q "TargetFramework.*net8.0" "${targets_file}"; then
            echo "::warning::The package targets file gates native library copy by exact TargetFramework values. Platform TFMs such as net10.0-maccatalyst do not satisfy that condition."
          elif [[ "${{ matrix.native-library-required }}" == "true" ]]; then
            echo "The package targets file does not gate native library copy by exact TargetFramework values."
          fi

          echo "## Package inspection, Aspose.Slides ${{ matrix.slides-version }}" >> "${GITHUB_STEP_SUMMARY}"
          echo '```text' >> "${GITHUB_STEP_SUMMARY}"
          cat package-inspection-${{ matrix.slides-version }}.txt >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload bundle inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slidesnet-44710-package-${{ matrix.slides-version }}
          path: |
            restore-${{ matrix.slides-version }}.log
            package-inspection-${{ matrix.slides-version }}.txt
